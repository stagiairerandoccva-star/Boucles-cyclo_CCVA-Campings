<script>

// Carte
var map = L.map('map').setView([46.5, 2.5], 6);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// GPX
L.GPX('./gpx/Trace1.gpx', {
    async: true
}).on('loaded', function(e) {
    map.fitBounds(e.target.getBounds());
}).addTo(map);


// ----------------------
// GPS UTILISATEUR
// ----------------------

var userMarker;
var accuracyCircle;

// 👉 1. Demande de localisation immédiate
map.locate({
    setView: true,        // centre la carte sur l'utilisateur
    watch: true,          // mise à jour continue
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
});

// 👉 2. Quand position trouvée
map.on('locationfound', function(e) {

    var radius = e.accuracy;

    // marker utilisateur
    if (!userMarker) {
        userMarker = L.marker(e.latlng)
            .addTo(map)
            .bindPopup("📍 Vous êtes ici")
            .openPopup();
    } else {
        userMarker.setLatLng(e.latlng);
    }

    // cercle de précision GPS
    if (!accuracyCircle) {
        accuracyCircle = L.circle(e.latlng, radius).addTo(map);
    } else {
        accuracyCircle.setLatLng(e.latlng);
        accuracyCircle.setRadius(radius);
    }

});

// 👉 3. Gestion erreur GPS
map.on('locationerror', function(e) {
    console.log("Erreur GPS :", e.message);
    alert("Impossible d'obtenir votre position GPS. Autorisez la localisation.");
});

</script>
