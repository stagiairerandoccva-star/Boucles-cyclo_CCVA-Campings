<script>
var map = L.map('map').setView([46.5, 2.5], 6); // centre France par défaut

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// GPX
var gpx = new L.GPX('./gpx/Trace-Boucle-du-Plan-deau_Club-du-Soleil-de-Dole.gpx', {
    async: true,
    marker_options: {
        startIconUrl: null,
        endIconUrl: null,
        shadowUrl: null
    }
})
.on('loaded', function(e) {
    map.fitBounds(e.target.getBounds());
})
.on('error', function(e) {
    console.error("Erreur GPX :", e);
})
.addTo(map);

// localisation (ok)
var marker;

map.locate({
    watch: true,
    enableHighAccuracy: true
});

map.on('locationfound', function(e) {
    if (marker) {
        marker.setLatLng(e.latlng);
    } else {
        marker = L.marker(e.latlng)
            .addTo(map)
            .bindPopup("Vous êtes ici");
    }
});
</script>
